<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISYADH - MEDIA COMPRESSOR</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Space+Grotesk:wght@300;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

    <style>
        /* --- VARIABLES & PALETTE BRUTALISM RISYADH --- */
        :root {
            --bg-color: #e0e0e0;
            --main-black: #0a0a0a;
            --card-bg: #ffffff;
            --accent-primary: #6a0dad;   
            --accent-secondary: #ccff00; 
            --accent-tertiary: #ff5f00;  
            --border-width: 3px;
            --font-head: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-head);
            background-color: var(--bg-color);
            color: var(--main-black);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .bg-noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.04; pointer-events: none; z-index: -1; background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjZmZmIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMwMDAiLz4KPC9zdmc+'); }
        .floating-shape { position: fixed; z-index: -2; border: 2px solid var(--main-black); opacity: 0.6; }
        .shape-1 { width: 100px; height: 100px; top: 10%; left: -20px; border-radius: 50%; background: var(--accent-secondary); }
        .shape-2 { width: 150px; height: 150px; bottom: 20%; right: -40px; transform: rotate(45deg); background: var(--accent-primary); }

        .marquee-top { background: var(--main-black); color: var(--card-bg); padding: 10px 0; font-family: var(--font-mono); font-size: 0.8rem; font-weight: bold; border-bottom: var(--border-width) solid var(--accent-secondary); overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; animation: scrollLeft 15s linear infinite; }
        @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); border-bottom: var(--border-width) solid var(--main-black); position: sticky; top: 0; z-index: 100; }
        .brand-glitch { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; position: relative; color: var(--main-black); text-transform: uppercase; }
        .brand-glitch::before { content: attr(data-text); position: absolute; left: 2px; text-shadow: -1px 0 var(--accent-primary); top: 0; color: var(--main-black); background: var(--bg-color); overflow: hidden; clip: rect(0, 900px, 0, 0); animation: glitch 2s infinite linear alternate-reverse; }
        @keyframes glitch { 0% { clip: rect(20px, 9999px, 10px, 0); } 100% { clip: rect(50px, 9999px, 80px, 0); } }

        .container { max-width: 550px; margin: 30px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 30px; }
        .cyber-card { background: var(--card-bg); border: var(--border-width) solid var(--main-black); box-shadow: 8px 8px 0 var(--main-black); position: relative; overflow: hidden; }
        .screw { position: absolute; font-family: monospace; font-weight: bold; font-size: 1.2rem; pointer-events: none; }
        .top-left { top: 5px; left: 10px; } .top-right { top: 5px; right: 10px; }
        .bottom-left { bottom: 5px; left: 10px; } .bottom-right { bottom: 5px; right: 10px; }

        .card-header-visual { background: var(--accent-primary); padding: 30px 20px 20px 20px; border-bottom: var(--border-width) solid var(--main-black); display: flex; justify-content: space-between; align-items: center; }
        .profile-section { display: flex; align-items: center; gap: 15px; }
        .avatar-img { width: 60px; height: 60px; border: 3px solid var(--main-black); background: #fff; border-radius: 12px; box-shadow: 4px 4px 0 var(--accent-secondary); object-fit: cover; }
        .profile-info { display: flex; flex-direction: column; }
        .user-role { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent-secondary); font-weight: bold; letter-spacing: 1px; }
        .user-action { font-weight: 900; color: #fff; font-size: 1.1rem; text-transform: uppercase; line-height: 1.1; }
        .decor-lines { font-family: var(--font-mono); color: rgba(255,255,255,0.3); font-weight: 900; font-size: 1.5rem; letter-spacing: -2px; }

        .card-body { padding: 25px; }
        .upload-area { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; border: 3px dashed var(--main-black); background: #f4f4f4; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 25px; transition: 0.2s; min-height: 250px; overflow: hidden; }
        .upload-area:hover { border-color: var(--accent-primary); background: #fff; }
        .upload-area.has-media { padding: 0; border: 3px solid var(--main-black); background: #000; }
        .upload-text { font-family: var(--font-mono); font-weight: bold; font-size: 0.95rem; color: var(--main-black); letter-spacing: 1px; position: relative; z-index: 2; }
        #uploadPlaceholder { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        .preview-media { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; object-fit: contain; background: #000; }

        input[type="file"] { display: none; }
        .info-box { background: var(--main-black); color: var(--accent-secondary); padding: 15px; border: 2px solid var(--main-black); font-family: var(--font-mono); font-size: 0.8rem; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .info-label { font-weight: bold; color: #fff; }
        .info-value { font-weight: bold; font-size: 1rem; }

        .control-group { margin-bottom: 25px; font-family: var(--font-mono); }
        .control-label { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 12px; background: #eee; border: 2px solid var(--main-black); outline: none; border-radius: 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; background: var(--accent-secondary); border: 3px solid var(--main-black); cursor: pointer; }

        .cyber-button { width: 100%; padding: 18px; border: 3px solid var(--main-black); background: var(--accent-secondary); color: var(--main-black); font-family: var(--font-head); font-weight: 900; font-size: 1.2rem; text-transform: uppercase; cursor: pointer; box-shadow: 5px 5px 0 var(--main-black); transition: 0.1s; text-align: center; }
        .cyber-button:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--main-black); }
        .cyber-button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; color: #666; }

        .result-card { background: #fff; border: 3px solid var(--main-black); margin-bottom: 20px; box-shadow: 8px 8px 0 rgba(0,0,0,0.2); }
        .result-header { background: var(--main-black); color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-weight: bold; font-size: 0.85rem; }
        .result-badge { background: var(--accent-tertiary); color: #000; font-weight: bold; padding: 2px 6px; font-size: 0.7rem; border: 1px solid #fff; }
        .result-body { padding: 15px; text-align: center; }

        .hidden { display: none !important; }
        .scanner { width: 100%; height: 4px; background: var(--accent-primary); animation: scan 2s infinite ease-in-out; margin-bottom: 15px; }
        @keyframes scan { 0% { width: 0; } 50% { width: 100%; } 100% { width: 0; margin-left: auto; } }
        .blink-text { font-family: var(--font-mono); font-weight: bold; animation: blink 1s infinite; text-align: center;}
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="bg-noise"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <div class="marquee-top">
        <div class="marquee-content">
            SYSTEM READY • V.6.0 ULTRA • MEDIA COMPRESSION ENGINE • REDUCE FILE SIZE • JPG/PNG/MP4 • RISYADH •
        </div>
    </div>

    <nav class="navbar">
        <div class="brand-glitch" data-text="RISYADH">Risyadh</div>
    </nav>

    <div class="container">
        <div class="cyber-card main-card">
            <div class="screw top-left">+</div><div class="screw top-right">+</div><div class="screw bottom-left">+</div><div class="screw bottom-right">+</div>
            <div class="card-header-visual">
                <div class="profile-section">
                    <img src="https://files.catbox.moe/1yu7kn.jpg" alt="Profile" class="avatar-img">
                    <div class="profile-info"><span class="user-role">RISYADH COMPRESSOR</span><span class="user-action">UPLOAD MEDIA FILE</span></div>
                </div>
                <div class="decor-lines">///</div>
            </div>
            <div class="card-body">
                <label for="mediaInput" class="upload-area" id="uploadBox">
                    <div id="uploadPlaceholder">
                        <span style="display: block; margin-bottom: 15px;"><svg width="60" height="60" viewBox="0 0 24 24" fill="var(--main-black)" xmlns="http://www.w3.org/2000/svg"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4C9.11 4 6.6 5.64 5.35 8.04C2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg></span>
                        <p class="upload-text">TAP UNTUK MEMILIH MEDIA</p>
                        <p style="font-size: 0.75rem; color: #555; margin-top: 8px; font-family: var(--font-head);">Sistem memproses file secara lokal.</p>
                    </div>
                    <img id="imgPreview" class="preview-media hidden" src="" alt="Preview">
                    <video id="vidPreview" class="preview-media hidden" controls playsinline muted loop></video>
                </label>
                <input type="file" id="mediaInput" accept="image/*, video/*">
                <div id="fileInfo" class="info-box hidden">
                    <div><span class="info-label">ORIGINAL SIZE:</span><br><span class="info-value" id="originalSize">0 MB</span></div>
                    <div style="text-align: right;"><span class="info-label">TYPE:</span><br><span class="info-value" id="mediaType" style="color: var(--accent-secondary);">UNKNOWN</span></div>
                </div>
                <div class="control-group">
                    <div class="control-label"><span>COMPRESSION LEVEL</span><span id="qualityVal">50%</span></div>
                    <input type="range" id="qualitySlider" min="0.1" max="1.0" step="0.1" value="0.5">
                </div>
                <button id="compressBtn" class="cyber-button" onclick="startCompression()"><span class="btn-text">COMPRESS NOW</span></button>
            </div>
        </div>
        <div id="loading" class="cyber-card hidden" style="padding: 30px 20px;"><div class="scanner"></div><p class="blink-text" id="loadingText">CRUNCHING DATA...</p></div>
        <div id="result" class="result-stack"></div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        // Setup API Baru FFmpeg v12
        const { FFmpeg } = window.FFmpeg;
        const { fetchFile } = window.FFmpegUtil;
        let ffmpeg = null;

        const mediaInput = document.getElementById('mediaInput');
        const uploadBox = document.getElementById('uploadBox');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const imgPreview = document.getElementById('imgPreview');
        const vidPreview = document.getElementById('vidPreview');
        const fileInfo = document.getElementById('fileInfo');
        const originalSizeDisplay = document.getElementById('originalSize');
        const mediaTypeDisplay = document.getElementById('mediaType');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityVal = document.getElementById('qualityVal');
        const compressBtn = document.getElementById('compressBtn');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const resultDiv = document.getElementById('result');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let selectedFile = null; let isVideo = false;

        qualitySlider.oninput = function() { qualityVal.innerText = Math.round(this.value * 100) + '%'; }

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes'; const k = 1024; const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB']; const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        mediaInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                const fileURL = URL.createObjectURL(selectedFile);
                uploadPlaceholder.classList.add('hidden'); uploadBox.classList.add('has-media');
                if (selectedFile.type.startsWith('video/')) {
                    isVideo = true; mediaTypeDisplay.innerText = "VIDEO"; imgPreview.classList.add('hidden');
                    vidPreview.src = fileURL; vidPreview.classList.remove('hidden'); vidPreview.play();
                } else {
                    isVideo = false; mediaTypeDisplay.innerText = "IMAGE"; vidPreview.classList.add('hidden');
                    vidPreview.pause(); imgPreview.src = fileURL; imgPreview.classList.remove('hidden');
                }
                originalSizeDisplay.innerText = formatBytes(selectedFile.size);
                fileInfo.classList.remove('hidden'); resultDiv.innerHTML = '';
            }
        });

        async function startCompression() {
            if (!selectedFile) return alert("Pilih file dulu!");
            compressBtn.disabled = true; loading.classList.remove('hidden'); resultDiv.innerHTML = '';
            const chosenQuality = Math.round(qualitySlider.value * 100);

            try {
                if (isVideo) {
                    
                    if (!ffmpeg) {
                        loadingText.innerText = "LOADING CORE ENGINE (NO SAB)...";
                        ffmpeg = new FFmpeg();
                        
                        // Memanggil versi SINGLE-THREAD (Tidak butuh SharedArrayBuffer sama sekali)
                        await ffmpeg.load({
                            coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
                            wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm'
                        });
                    }

                    loadingText.innerText = "COMPRESSING VIDEO (MAY TAKE A WHILE)...";
                    
                    await ffmpeg.writeFile('input.mp4', await fetchFile(selectedFile));
                    
                    const crfValue = Math.round(45 - (qualitySlider.value * 25)); 

                    // Eksekusi Kompresi
                    await ffmpeg.exec(['-i', 'input.mp4', '-vcodec', 'libx264', '-crf', crfValue.toString(), '-preset', 'ultrafast', 'output.mp4']);

                    const data = await ffmpeg.readFile('output.mp4');
                    const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
                    const videoUrl = URL.createObjectURL(videoBlob);
                    
                    showResult(videoUrl, videoBlob.size, "mp4", chosenQuality);
                    resetUI();
                    
                } else {
                    loadingText.innerText = "COMPRESSING IMAGE...";
                    const img = new Image(); img.src = URL.createObjectURL(selectedFile);
                    img.onload = function() {
                        canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0);
                        const outType = selectedFile.type === 'image/png' ? 'image/png' : 'image/jpeg';
                        const ext = outType.includes('png') ? 'png' : 'jpg';
                        
                        const dataUrl = canvas.toDataURL(outType, parseFloat(qualitySlider.value));
                        fetch(dataUrl).then(res => res.blob()).then(blob => {
                            showResult(dataUrl, blob.size, ext, chosenQuality);
                            resetUI();
                        });
                    };
                }
            } catch (err) { alert("ERROR: " + err.message); resetUI(); }
        }

        function resetUI() { 
            compressBtn.disabled = false; 
            loading.classList.add('hidden'); 
            loadingText.innerText = "CRUNCHING DATA...";
        }

        function showResult(mediaUrl, newSize, ext, qPercent) {
            const card = document.createElement('div'); card.className = 'cyber-card result-card';
            
            let newName = `risyadh.${ext}`;

            card.innerHTML = `
                <div class="result-header"><span>COMPRESSION SUCCESS</span><span class="result-badge">READY</span></div>
                <div class="result-body" style="padding-top: 20px;">
                    <div style="background: var(--main-black); padding: 15px; border: 2px solid var(--main-black); margin-bottom: 15px; text-align: left;">
                        <div style="color: var(--accent-secondary); font-family: 'JetBrains Mono'; font-size: 0.8rem; font-weight: bold;">
                            > NEW SIZE: <span style="color:#fff; font-size:1.2rem;">${formatBytes(newSize)}</span>
                        </div>
                        <div style="color: var(--accent-tertiary); font-family: 'JetBrains Mono'; font-size: 0.8rem; font-weight: bold; margin-top:5px;">
                            > COMPRESSION RESULT: ${qPercent}%
                        </div>
                        <div style="color: #ccc; font-family: 'JetBrains Mono'; font-size: 0.7rem; margin-top:5px; word-break: break-all;">> FILENAME: ${newName}</div>
                    </div>
                    ${isVideo ? `<video src="${mediaUrl}" controls style="width: 100%; max-height: 250px; background:#000; border: 2px solid var(--main-black); margin-bottom: 15px;"></video>` : `<img src="${mediaUrl}" alt="Result" style="width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 15px; border: 2px solid var(--main-black); background:#000;">`}
                    <a href="${mediaUrl}" download="${newName}" style="text-decoration: none;"><button class="cyber-button" style="background: var(--accent-primary); color: white; padding: 12px; font-size: 1rem;">DOWNLOAD FILE</button></a>
                </div>
            `;
            resultDiv.appendChild(card); card.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

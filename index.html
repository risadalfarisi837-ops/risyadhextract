<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISYADH - AUDIO EXTRACTOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Space+Grotesk:wght@300;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES & PALETTE --- */
        :root {
            --bg-color: #e0e0e0;
            --main-black: #0a0a0a;
            --card-bg: #ffffff;
            
            --accent-primary: #6a0dad;  
            --accent-secondary: #ccff00; 
            --accent-tertiary: #ff5f00;  
            
            --border-width: 3px;
            --font-head: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-head);
            background-color: var(--bg-color);
            color: var(--main-black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- DECORATION & NOISE --- */
        .bg-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04;
            pointer-events: none;
            z-index: -1;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjZmZmIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMwMDAiLz4KPC9zdmc+');
        }

        .floating-shape {
            position: fixed;
            z-index: -2;
            border: 2px solid var(--main-black);
            background: var(--accent-secondary);
            opacity: 0.6;
        }
        .shape-1 { width: 100px; height: 100px; top: 10%; left: -20px; border-radius: 50%; }
        .shape-2 { width: 150px; height: 150px; bottom: 20%; right: -40px; transform: rotate(45deg); background: var(--accent-primary); }

        /* --- MARQUEE --- */
        .marquee-top {
            background: var(--main-black);
            color: var(--card-bg);
            padding: 10px 0;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: bold;
            border-bottom: var(--border-width) solid var(--accent-secondary);
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee-content { display: inline-block; animation: scrollLeft 15s linear infinite; }
        @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            border-bottom: var(--border-width) solid var(--main-black);
            position: sticky; top: 0; z-index: 100;
        }

        .brand-container { display: flex; align-items: center; }

        .brand-glitch {
            font-weight: 900; font-size: 1.5rem; letter-spacing: -1px;
            position: relative;
            color: var(--main-black);
            text-transform: uppercase;
        }
        .brand-glitch::before {
            content: attr(data-text); position: absolute; left: 2px; text-shadow: -1px 0 var(--accent-primary);
            top: 0; color: var(--main-black); background: var(--bg-color); overflow: hidden; clip: rect(0, 900px, 0, 0); animation: glitch 2s infinite linear alternate-reverse;
        }
        @keyframes glitch { 0% { clip: rect(20px, 9999px, 10px, 0); } 100% { clip: rect(50px, 9999px, 80px, 0); } }

        /* --- CENTERED CONTAINER --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container { 
            width: 100%; 
            max-width: 550px; 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
        }

        .cyber-card {
            background: var(--card-bg);
            border: var(--border-width) solid var(--main-black);
            box-shadow: 8px 8px 0 var(--main-black); 
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .screw { position: absolute; font-family: monospace; font-weight: bold; font-size: 1.2rem; pointer-events: none; }
        .top-left { top: 5px; left: 10px; } .top-right { top: 5px; right: 10px; }
        .bottom-left { bottom: 5px; left: 10px; } .bottom-right { bottom: 5px; right: 10px; }

        /* HEADER VISUAL */
        .card-header-visual {
            background: var(--accent-primary);
            padding: 30px 20px 20px 20px;
            border-bottom: var(--border-width) solid var(--main-black);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-section { display: flex; align-items: center; gap: 15px; }

        /* AVATAR STYLING */
        .avatar-img {
            width: 60px; height: 60px;
            border: 3px solid var(--main-black);
            background: #fff;
            border-radius: 12px; 
            box-shadow: 4px 4px 0 var(--accent-secondary);
            object-fit: cover; 
            object-position: top center; 
        }

        .profile-info { display: flex; flex-direction: column; }
        .user-role { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent-secondary); font-weight: bold; letter-spacing: 1px; }
        .user-action { font-weight: 900; color: #fff; font-size: 1.1rem; text-transform: uppercase; line-height: 1.1; }

        .decor-lines { font-family: var(--font-mono); color: rgba(255,255,255,0.3); font-weight: 900; font-size: 1.5rem; letter-spacing: -2px; }

        /* --- INPUT SECTION --- */
        .card-body { padding: 25px; }
        
        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: 3px dashed var(--main-black);
            background: #f4f4f4;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.2s;
            min-height: 180px;
            overflow: hidden;
            padding: 20px;
        }
        .upload-area:hover {
            background: #fff;
            border-color: var(--accent-primary);
        }

        /* Saat video dipilih, hilangkan padding dan border dashed */
        .upload-area.has-video {
            padding: 0;
            border: 3px solid var(--main-black);
            background: var(--main-black);
        }

        .upload-text {
            font-family: var(--font-mono);
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--main-black);
            word-break: break-all;
        }

        /* Video Tampil Penuh */
        #videoPreview {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: contain;
            background: #000;
            display: block;
        }

        /* Nama File di bawah Video */
        #fileName {
            width: 100%;
            background: var(--main-black);
            color: var(--accent-secondary);
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            margin: 0;
            border-top: 2px solid #333;
        }

        input[type="file"] { display: none; }

        .platform-tags { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .platform-tags span {
            font-size: 0.75rem; font-weight: bold; background: #eee;
            padding: 4px 8px; border: 1px solid var(--main-black);
            font-family: var(--font-mono);
        }

        /* --- BUTTON UTAMA --- */
        .cyber-button {
            width: 100%; padding: 18px;
            border: 3px solid var(--main-black);
            background: var(--accent-secondary); 
            color: var(--main-black);
            font-family: var(--font-head); font-weight: 900; font-size: 1.2rem;
            text-transform: uppercase; cursor: pointer;
            position: relative; overflow: hidden;
            box-shadow: 5px 5px 0 var(--main-black);
            transition: all 0.1s;
            text-align: center;
        }
        .cyber-button:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--main-black); }
        .cyber-button:hover { background: #bfff00; }
        .cyber-button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

        /* --- RESULT CARD STYLING --- */
        .result-card {
            background: #fff; border: 3px solid var(--main-black);
            margin-bottom: 20px; padding: 0; box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
        }
        .result-header {
            background: var(--main-black); color: #fff;
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-mono); font-weight: bold; font-size: 0.85rem;
        }
        .result-badge { background: var(--accent-tertiary); color: #000; font-weight: bold; padding: 2px 6px; font-size: 0.7rem; border: 1px solid #fff; }
        .result-body { padding: 15px; text-align: center; }

        audio {
            width: 100%;
            height: 40px;
            outline: none;
            margin-bottom: 15px;
            border: 2px solid var(--main-black);
            border-radius: 0;
        }

        /* --- FOOTER --- */
        .risyadh-footer {
            text-align: center; margin-top: 20px; padding-bottom: 20px;
            font-family: var(--font-mono);
        }
        .footer-line { width: 50px; height: 4px; background: var(--main-black); margin: 0 auto 15px auto; }
        .risyadh-highlight { background: var(--main-black); color: #fff; padding: 2px 6px; font-weight: bold; }

        .hidden { display: none !important; }

        /* LOADING & ERROR */
        .scanner { width: 100%; height: 4px; background: var(--accent-primary); animation: scan 2s infinite ease-in-out; margin-bottom: 15px; }
        @keyframes scan { 0% { width: 0; } 50% { width: 100%; } 100% { width: 0; margin-left: auto; } }
        .blink-text { font-family: var(--font-mono); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .error-state { border-color: red; box-shadow: 8px 8px 0 red; }
        .error-header { background: red; color: white; padding: 10px; font-weight: bold; font-family: var(--font-mono); }
        .error-body { padding: 20px; color: red; font-family: var(--font-mono); font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="bg-noise"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <div class="marquee-top">
        <div class="marquee-content">
            SYSTEM READY • V.5.0 ULTRA • VIDEO TO AUDIO EXTRACTOR • OFFLINE ENGINE • RISYADH •
        </div>
    </div>

    <nav class="navbar">
        <div class="brand-container">
            <div class="brand-glitch" data-text="RISYADH">Risyadh</div>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="container">
            
            <div class="cyber-card main-card">
                <div class="screw top-left">+</div>
                <div class="screw top-right">+</div>
                <div class="screw bottom-left">+</div>
                <div class="screw bottom-right">+</div>

                <div class="card-header-visual">
                    <div class="profile-section">
                        <img src="https://files.catbox.moe/1yu7kn.jpg" alt="User Profile" class="avatar-img" id="userAvatar">
                        <div class="profile-info">
                            <span class="user-role">RISYADH EXTRACTOR</span>
                            <span class="user-action">UPLOAD VIDEO FILE</span>
                        </div>
                    </div>
                    <div class="decor-lines">///</div>
                </div>
                
                <div class="card-body">
                    
                    <label for="videoInput" class="upload-area" id="uploadBox">
                        <div id="uploadPlaceholder">
                            <span style="font-size: 2rem; display: block; margin-bottom: 10px;">📼</span>
                            <p class="upload-text">TAP TO SELECT VIDEO (MP4/MOV)</p>
                        </div>
                        
                        <video id="videoPreview" class="hidden" controls playsinline></video>
                        <p id="fileName" class="hidden"></p>
                    </label>
                    <input type="file" id="videoInput" accept="video/*">

                    <div class="platform-tags">
                        <span>#OFFLINE</span> <span>#NO-SERVER</span> <span>#WAV-EXTRACT</span>
                    </div>
                    
                    <button id="extractBtn" onclick="processAudio()" class="cyber-button">
                        <span class="btn-text">EXTRACT AUDIO</span>
                    </button>
                </div>
            </div>

            <div id="loading" class="cyber-card hidden" style="text-align: center; padding: 40px;">
                <div class="scanner"></div>
                <p class="blink-text" id="loadingText">DECODING VIDEO DATA...</p>
            </div>

            <div id="error-msg" class="cyber-card error-state hidden">
                <div class="error-header">SYSTEM ERROR</div>
                <div class="error-body" id="error-text"></div>
            </div>

            <div id="result" class="result-stack"></div>

            <footer class="risyadh-footer">
                <div class="footer-line"></div>
                <p>POWERED BY <span class="risyadh-highlight">RISYADH</span></p>
                <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 5px;">CLIENT-SIDE AUDIO ENGINE</p>
            </footer>

        </div>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const fileNameDisplay = document.getElementById('fileName');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const uploadBox = document.getElementById('uploadBox');
        const videoPreview = document.getElementById('videoPreview');
        const extractBtn = document.getElementById('extractBtn');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const errorCard = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');
        
        let selectedFile = null;

        // Proses saat file dipilih
        videoInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                
                // Ubah styling kotak upload jadi mode video-full
                uploadBox.classList.add('has-video');
                
                // Tampilkan nama file di blok hitam bawah video
                fileNameDisplay.innerHTML = `> FILE: ${selectedFile.name}`;
                fileNameDisplay.classList.remove('hidden');

                // Sembunyikan ikon kaset
                uploadPlaceholder.classList.add('hidden');

                // Buat URL sementara untuk memutar video
                const fileURL = URL.createObjectURL(selectedFile);
                videoPreview.src = fileURL;
                videoPreview.classList.remove('hidden');
            }
        });

        async function processAudio() {
            if (!selectedFile) {
                showError("System Error: No video file selected!");
                return;
            }

            // Reset UI
            extractBtn.disabled = true;
            extractBtn.innerHTML = "PROCESSING...";
            loading.classList.remove('hidden');
            resultDiv.innerHTML = '';
            errorCard.classList.add('hidden');

            try {
                // Menggunakan FileReader untuk membaca file
                const reader = new FileReader();
                
                reader.onload = async function(e) {
                    try {
                        const arrayBuffer = e.target.result;
                        
                        // Membuat AudioContext
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        const audioCtx = new AudioContext();
                        
                        document.getElementById('loadingText').innerText = "SEPARATING AUDIO CHANNELS...";

                        // Dekode data audio dari video
                        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                        
                        document.getElementById('loadingText').innerText = "ENCODING TO WAV FORMAT...";

                        // Ubah AudioBuffer menjadi format file WAV
                        const wavBlob = audioBufferToWav(audioBuffer);
                        const audioUrl = URL.createObjectURL(wavBlob);
                        
                        // Render hasil
                        renderResult(audioUrl, selectedFile.name);
                        
                    } catch (err) {
                        showError("Gagal mengekstrak audio. Pastikan file adalah video yang valid.");
                    } finally {
                        resetUI();
                    }
                };

                reader.onerror = function() {
                    showError("Gagal membaca file video.");
                    resetUI();
                };

                reader.readAsArrayBuffer(selectedFile);

            } catch (err) {
                showError(err.message);
                resetUI();
            }
        }

        function resetUI() {
            extractBtn.disabled = false;
            extractBtn.innerHTML = "EXTRACT AUDIO";
            loading.classList.add('hidden');
            document.getElementById('loadingText').innerText = "DECODING VIDEO DATA...";
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorCard.classList.remove('hidden');
        }

        // Fungsi Render HTML Hasil
        function renderResult(audioUrl, originalName) {
            const card = document.createElement('div');
            card.className = 'cyber-card result-card';
            
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            card.style.transition = 'all 0.4s ease';

            setTimeout(() => { card.style.opacity = '1'; card.style.transform = 'translateY(0)'; }, 100);

            // Membuat nama file baru (.wav)
            let newName = originalName.substring(0, originalName.lastIndexOf('.')) || originalName;
            newName += "_audio.wav";

            card.innerHTML = `
                <div class="result-header">
                    <span>AUDIO EXTRACTED</span>
                    <span class="result-badge">SUCCESS</span>
                </div>
                <div class="result-body">
                    <div style="margin-bottom: 15px; font-family: 'JetBrains Mono'; font-size: 0.8rem; font-weight: bold; word-break: break-all;">
                        > FILE: ${newName}
                    </div>
                    
                    <audio controls src="${audioUrl}"></audio>

                    <div style="margin-top: 15px;">
                        <a href="${audioUrl}" download="${newName}" style="text-decoration: none;">
                            <button class="cyber-button" style="background: var(--accent-primary); color: white; padding: 12px; font-size: 1rem;">
                                DOWNLOAD AUDIO FILE
                            </button>
                        </a>
                    </div>
                </div>
            `;

            resultDiv.appendChild(card);
        }

        // --- FUNGSI CORE: Konversi AudioBuffer ke File WAV ---
        function audioBufferToWav(buffer) {
            let numOfChan = buffer.numberOfChannels,
                length = buffer.length * numOfChan * 2 + 44,
                bufferArray = new ArrayBuffer(length),
                view = new DataView(bufferArray),
                channels = [], i, sample,
                offset = 0,
                pos = 0;

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

            // Tulis Header WAV standar
            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8); // file length - 8
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt " chunk
            setUint32(16); // length = 16
            setUint16(1); // PCM (uncompressed)
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
            setUint16(numOfChan * 2); // block-align
            setUint16(16); // 16-bit
            setUint32(0x61746164); // "data" - chunk
            setUint32(length - pos - 4); // chunk length

            // Masukkan data per channel
            for (i = 0; i < buffer.numberOfChannels; i++) {
                channels.push(buffer.getChannelData(i));
            }

            // Interleave & konversi ke 16-bit PCM
            while (pos < length) {
                for (i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); // clamp
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0; // scale ke 16-bit
                    view.setInt16(pos, sample, true); // tulis
                    pos += 2;
                }
                offset++;
            }
            return new Blob([bufferArray], { type: "audio/wav" });
        }
    </script>
</body>
</html>
